<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Pine City Mall - Shops Directory</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="logo-area">
        <img
          src="images/pine city mall logo.png"
          alt="Mall Logo"
          class="mall-logo"
        />
        <span class="mall-name">PINE CITY MALL</span>
      </div>
      <button class="search-icon-btn" aria-label="Search">
        <span class="material-symbols-outlined">search</span>
      </button>
    </header>

    <main class="main-content">
      <!-- Search Bar -->
      <div class="search-container">
        <span class="material-symbols-outlined search-icon">search</span>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search stores..."
        />
      </div>

      <!-- Category Filter Chips -->
      <div class="categories-filter">
        <div class="filter-chips" id="chipList"></div>
      </div>

      <!-- Stores will be rendered here -->
      <div id="storesContainer"></div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span class="material-symbols-outlined">home</span>
        <span>Home</span>
      </a>
      <a href="shops.html" class="nav-item active">
        <span
          class="material-symbols-outlined"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >storefront</span
        >
        <span>Shops</span>
      </a>
      <a href="map.html" class="nav-item">
        <span class="material-symbols-outlined">explore</span>
        <span>Map</span>
      </a>
      <a href="movies.html" class="nav-item">
        <span class="material-symbols-outlined">movie</span>
        <span>Movies</span>
      </a>
      <a href="information.html" class="nav-item">
        <span class="material-symbols-outlined">info</span>
        <span>Info</span>
      </a>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
